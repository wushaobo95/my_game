<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="gameTitle">弧光幸存者 - 无限模式</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas" width="1280" height="720"></canvas>

        <div id="gameOver">
            <h1 id="gameOverTitle">游戏结束</h1>
            <div class="stats">
                <p id="finalTimeLabel">存活时间: <span id="finalTime">0</span> 秒</p>
                <p id="finalKillsLabel">击杀数: <span id="finalKills">0</span></p>
                <p id="finalLevelLabel">最终等级: <span id="finalLevel">1</span></p>
            </div>
            <button id="restartBtn">再来一局 (R)</button>
        </div>

        <div id="upgradeScreen">
            <div class="upgrade-cards" id="upgradeCards"></div>
        </div>

        <div id="pauseScreen">
            <h1 id="pauseTitle">已暂停</h1>
            <p>按 ESC 继续</p>
            <button id="resumeBtn">继续游戏</button>
            <button id="muteBtn">🔊 音乐: 开</button>
        </div>

        <div id="statusPanel">
            <h3 id="statsTitle">属性 & 加成</h3>
            <div id="statsList"></div>
            <h3 style="margin-top:10px" id="skillsTitle">技能</h3>
            <div id="skillsList"></div>
            <h3 style="margin-top:10px" id="itemsTitle">法宝</h3>
            <div id="itemsList"></div>
        </div>

        <div id="bossWarning">
            <span id="bossWarningText">BOSS 来袭</span>
        </div>

        <div id="itemDescriptionScreen">
            <div id="itemDescription"></div>
        </div>

        <div id="instructions">WASD 移动 | 自动攻击 | ESC 暂停 | R 重置</div>
    </div>

    <!-- 加载顺序：core → entities → systems → game -->
    <script src="js/core/config.js"></script>
    <script src="js/core/resource-loader.js"></script>
    <script src="js/core/game-config.js"></script>
    <script src="js/core/strings.js"></script>
    <script>
        // 在 strings.js 加载后初始化 HTML 文案
        (function() {
            var STR = ArcSurvivors.STRINGS.UI;
            var formatString = ArcSurvivors.formatString;

            // 设置标题
            document.title = STR.GAME_TITLE;
            document.getElementById('gameTitle').textContent = STR.GAME_TITLE;

            // 设置游戏结束界面
            document.getElementById('gameOverTitle').textContent = STR.GAME_OVER_TITLE;
            document.getElementById('restartBtn').textContent = STR.RESTART_BTN;

            // 设置暂停界面
            document.getElementById('pauseTitle').textContent = STR.PAUSE_TITLE;
            document.getElementById('resumeBtn').textContent = STR.RESUME_BTN;
            document.getElementById('muteBtn').textContent = STR.MUTE_ON;

            // 设置状态面板
            document.getElementById('statsTitle').textContent = '属性 & 加成';
            document.getElementById('skillsTitle').textContent = STR.SKILLS_TITLE;
            document.getElementById('itemsTitle').textContent = STR.ITEMS_TITLE;

            // 设置 Boss 警告
            document.getElementById('bossWarningText').textContent = STR.BOSS_WARNING;

            // 设置操作说明
            document.getElementById('instructions').textContent = STR.INSTRUCTIONS;
        })();
    </script>
    <script src="js/core/event.js"></script>
    <script src="js/core/utils.js"></script>
    <script src="js/entities/particle.js"></script>
    <script src="js/entities/gem.js"></script>
    <script src="js/entities/bullet.js"></script>
    <script src="js/entities/enemy.js"></script>
    <script src="js/entities/bosses/boss-base.js"></script>
    <script src="js/entities/bosses/skills/active/bullet-storm.js"></script>
    <script src="js/entities/bosses/skills/active/homing-missiles.js"></script>
    <script src="js/entities/bosses/skills/active/laser-sweep.js"></script>
    <script src="js/entities/bosses/skills/active/charge.js"></script>
    <script src="js/entities/bosses/skills/passive/damage-reduction.js"></script>
    <script src="js/entities/bosses/boss-default.js"></script>
    <script src="js/entities/player.js"></script>
    <script src="js/systems/audio.js"></script>
    <script src="js/systems/buff.js"></script>
    <script src="js/systems/upgrade.js"></script>
    <script src="js/systems/renderer.js"></script>
    <script src="js/game.js"></script>
</body>
</html>
