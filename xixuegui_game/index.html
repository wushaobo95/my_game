<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>弧光幸存者 - 无限模式</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas" width="1280" height="720"></canvas>

        <div id="gameOver">
            <h1>游戏结束</h1>
            <div class="stats">
                <p>存活时间: <span id="finalTime">0</span> 秒</p>
                <p>击杀数: <span id="finalKills">0</span></p>
                <p>最终等级: <span id="finalLevel">1</span></p>
            </div>
            <button id="restartBtn">重铸 (R)</button>
        </div>

        <div id="upgradeScreen">
            <div class="upgrade-cards" id="upgradeCards"></div>
        </div>

        <div id="pauseScreen">
        <h1>已暂停</h1>
        <p>按 ESC 继续</p>
        <button id="resumeBtn">继续游戏</button>
        <button id="muteBtn">🔊 音乐: 开</button>
    </div>

    <div id="statusPanel">
        <h3>属性 & 加成</h3>
        <div id="statsList"></div>
        <h3 style="margin-top:10px">已获得技能</h3>
        <div id="upgradesList"></div>
    </div>

    <div id="bossWarning">
        <span>BOSS 来袭</span>
    </div>

    <div id="instructions">WASD 移动 | 自动攻击 | ESC 暂停 | R 重置</div>
    </div>

    <!-- 加载顺序：config → utils → audio → class → systems → main -->
    <script src="js/config.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/audio.js"></script>
    <script src="js/particle.js"></script>
    <script src="js/gem.js"></script>
    <script src="js/bullet.js"></script>
    <script src="js/enemy.js"></script>
    <script src="js/player.js"></script>
    <script src="js/upgrades.js"></script>
    <script src="js/renderer.js"></script>
    <script src="js/game.js"></script>
</body>
</html>
