<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>敌人合图测试</title>
    <style>
        body {
            background: #1a1a1a;
            color: #fff;
            font-family: Arial, sans-serif;
            padding: 20px;
        }
        h1 { color: #8bc34a; }
        h2 { color: #9ccc65; margin-bottom: 10px; }
        .test-container {
            background: #2d2d2d;
            padding: 20px;
            margin: 10px 0;
            border-radius: 8px;
        }
        canvas {
            border: 2px solid #8bc34a;
            background: #0d1f0d;
            margin: 10px 0;
        }
        .status { 
            color: #ff9800; 
            margin: 5px 0;
        }
        .success { color: #4caf50; }
        .error { color: #f44336; }
        button {
            background: #8bc34a;
            color: #1a1a1a;
            border: none;
            padding: 8px 14px;
            font-size: 14px;
            cursor: pointer;
            border-radius: 4px;
            margin: 3px;
        }
        button:hover {
            background: #9ccc65;
        }
        .btn-group {
            margin: 5px 0;
        }
        .btn-group button {
            background: #4a4a4a;
            color: #fff;
        }
    </style>
</head>
<body>
    <h1>🐛 敌人合图资源测试</h1>
    
    <div class="test-container">
        <h2>加载状态</h2>
        <div id="loadStatus" class="status">等待加载...</div>
        <div id="progressBar" style="width: 100%; height: 20px; background: #333; border-radius: 10px; overflow: hidden; margin: 10px 0;">
            <div id="progressFill" style="width: 0%; height: 100%; background: #8bc34a; transition: width 0.3s;"></div>
        </div>
        <button onclick="startLoading()">开始加载资源</button>
        <button onclick="testSpriteSheet()">测试合图</button>
    </div>

    <div class="test-container">
        <h2>合图预览</h2>
        <div id="sheetStatus" class="status">合图未加载</div>
        <canvas id="sheetPreview" width="512" height="512"></canvas>
    </div>

    <div class="test-container">
        <h2>敌人绘制测试</h2>
        <div id="drawStatus" class="status">未开始绘制测试</div>
        <canvas id="enemyCanvas" width="900" height="650"></canvas>
        <div class="btn-group">
            <button onclick="drawAllEnemies()">绘制所有敌人类型</button>
        </div>
    </div>

    <script src="js/core/config.js"></script>
    <script src="js/core/resource-loader.js"></script>
    <script src="js/core/game-config.js"></script>
    <script src="js/core/strings.js"></script>
    <script src="js/core/event.js"></script>
    <script src="js/core/utils.js"></script>

    <script>
        // 16种敌人类型配置
        var ENEMY_TYPE_NAMES = {
            'normal': '森林毒蜘蛛',
            'fast': '树洞小蝙蝠',
            'split': '大蚱蜢母体',
            'mini': '小蚱蜢',
            'ranged': '花丛大黄蜂',
            'butterfly': '迷幻蝶',
            'ant': '军团蚁',
            'ladybug': '幸运瓢虫',
            'rat': '棕色老鼠',
            'cockroach': '不死螂',
            'mantis': '刀锋螳螂',
            'fly': '烦人蝇',
            'dragonfly': '极速蜻蜓',
            'mosquito': '吸血蚊',
            'hedgehog': '刺球猬',
            'gecko': '壁虎蜥'
        };

        function updateStatus(id, message, isError) {
            var el = document.getElementById(id);
            el.textContent = message;
            el.className = isError ? 'status error' : 'status success';
        }

        function updateProgress(loaded, total) {
            var percent = Math.round((loaded / total) * 100);
            document.getElementById('progressFill').style.width = percent + '%';
            updateStatus('loadStatus', '加载中: ' + loaded + '/' + total + ' (' + percent + '%)');
        }

        function startLoading() {
            updateStatus('loadStatus', '开始加载...', false);
            
            ArcSurvivors.ResourceLoader.init(
                function(loaded, total) {
                    updateProgress(loaded, total);
                },
                function() {
                    updateStatus('loadStatus', '加载完成！', false);
                    testSpriteSheet();
                }
            );
        }

        function testSpriteSheet() {
            var RL = ArcSurvivors.ResourceLoader;
            var canvas = document.getElementById('sheetPreview');
            var ctx = canvas.getContext('2d');
            
            if (!RL.hasSpriteSheet('enemies')) {
                updateStatus('sheetStatus', '合图未加载或加载失败', true);
                return;
            }
            
            var sheetInfo = RL.getSpriteFromSheet('normal');
            if (sheetInfo && sheetInfo.image) {
                ctx.drawImage(sheetInfo.image, 0, 0, 512, 512);
                updateStatus('sheetStatus', '合图加载成功！显示5x5网格预览', false);
                
                ctx.strokeStyle = 'rgba(139, 195, 74, 0.5)';
                ctx.lineWidth = 1;
                for (var i = 1; i < 5; i++) {
                    var pos = (i / 5) * 512;
                    ctx.beginPath();
                    ctx.moveTo(pos, 0);
                    ctx.lineTo(pos, 512);
                    ctx.stroke();
                    ctx.beginPath();
                    ctx.moveTo(0, pos);
                    ctx.lineTo(512, pos);
                    ctx.stroke();
                }
            }
        }

        function drawAllEnemies() {
            var canvas = document.getElementById('enemyCanvas');
            var ctx = canvas.getContext('2d');
            var RL = ArcSurvivors.ResourceLoader;
            
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            if (!RL.hasSpriteSheet('enemies')) {
                updateStatus('drawStatus', '合图未加载 - 使用Canvas绘制测试', true);
                drawAllEnemiesCanvas(ctx);
                return;
            }
            
            var types = Object.keys(ENEMY_TYPE_NAMES);
            
            var startX = 100;
            var startY = 130;
            var cols = 5;
            var spacingX = 160;
            var spacingY = 150;
            var radius = 50;
            
            ctx.fillStyle = '#8bc34a';
            ctx.font = 'bold 22px Arial';
            ctx.textAlign = 'center';
            ctx.fillText('所有敌人类型预览 (' + types.length + '种)', canvas.width / 2, 40);
            
            ctx.fillStyle = '#aaa';
            ctx.font = '12px Arial';
            ctx.fillText('点击敌人名称按钮可单独绘制', canvas.width / 2, 65);
            
            for (var i = 0; i < types.length; i++) {
                var type = types[i];
                var spriteInfo = RL.getSpriteFromSheet(type);
                
                var col = i % cols;
                var row = Math.floor(i / cols);
                var x = startX + col * spacingX;
                var y = startY + row * spacingY;
                
                ctx.save();
                ctx.translate(x, y);
                
                // 绘制背景圆
                ctx.fillStyle = 'rgba(139, 195, 74, 0.15)';
                ctx.beginPath();
                ctx.arc(0, 0, radius + 5, 0, Math.PI * 2);
                ctx.fill();
                
                // 边框
                ctx.strokeStyle = 'rgba(139, 195, 74, 0.4)';
                ctx.lineWidth = 1;
                ctx.stroke();
                
                if (spriteInfo) {
                    // 绘制精灵
                    ctx.drawImage(
                        spriteInfo.image,
                        spriteInfo.sx, spriteInfo.sy,
                        spriteInfo.sw, spriteInfo.sh,
                        -radius, -radius,
                        radius * 2, radius * 2
                    );
                } else {
                    // 无精灵图时显示问号
                    ctx.fillStyle = '#666';
                    ctx.font = 'bold 30px Arial';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText('?', 0, 0);
                }
                
                ctx.restore();
                
                // 绘制名称和类型
                ctx.fillStyle = '#aaa';
                ctx.font = 'bold 13px Arial';
                ctx.textAlign = 'center';
                ctx.fillText(ENEMY_TYPE_NAMES[type], x, y + radius + 22);
                
                ctx.fillStyle = '#666';
                ctx.font = '11px Arial';
                ctx.fillText('(' + type + ')', x, y + radius + 36);
            }
            
            updateStatus('drawStatus', '所有敌人类型绘制完成: ' + types.length + '种', false);
        }

        // Canvas绘制测试（无精灵图时）
        function drawAllEnemiesCanvas(ctx) {
            var canvas = document.getElementById('enemyCanvas');
            ctx = ctx || canvas.getContext('2d');
            
            var types = Object.keys(ENEMY_TYPE_NAMES);
            
            var startX = 100;
            var startY = 130;
            var cols = 5;
            var spacingX = 160;
            var spacingY = 150;
            var radius = 40;
            
            ctx.fillStyle = '#8bc34a';
            ctx.font = 'bold 22px Arial';
            ctx.textAlign = 'center';
            ctx.fillText('所有敌人类型预览 - Canvas绘制', canvas.width / 2, 40);
            
            // 模拟敌人对象
            for (var i = 0; i < types.length; i++) {
                var type = types[i];
                
                var col = i % cols;
                var row = Math.floor(i / cols);
                var x = startX + col * spacingX;
                var y = startY + row * spacingY;
                
                // 绘制测试圆
                ctx.save();
                ctx.translate(x, y);
                
                ctx.fillStyle = 'rgba(100, 150, 100, 0.3)';
                ctx.beginPath();
                ctx.arc(0, 0, radius, 0, Math.PI * 2);
                ctx.fill();
                ctx.strokeStyle = '#8bc34a';
                ctx.lineWidth = 2;
                ctx.stroke();
                
                ctx.fillStyle = '#fff';
                ctx.font = 'bold 12px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(type.substring(0, 3).toUpperCase(), 0, 0);
                
                ctx.restore();
                
                ctx.fillStyle = '#aaa';
                ctx.font = 'bold 13px Arial';
                ctx.textAlign = 'center';
                ctx.fillText(ENEMY_TYPE_NAMES[type], x, y + radius + 22);
            }
            
            updateStatus('drawStatus', 'Canvas测试绘制完成', false);
        }
    </script>
</body>
</html>
