<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>敌人合图测试</title>
    <style>
        body {
            background: #1a1a1a;
            color: #fff;
            font-family: Arial, sans-serif;
            padding: 20px;
        }
        h1 { color: #8bc34a; }
        .test-container {
            background: #2d2d2d;
            padding: 20px;
            margin: 10px 0;
            border-radius: 8px;
        }
        canvas {
            border: 2px solid #8bc34a;
            background: #0d1f0d;
            margin: 10px 0;
        }
        .status { 
            color: #ff9800; 
            margin: 5px 0;
        }
        .success { color: #4caf50; }
        .error { color: #f44336; }
        button {
            background: #8bc34a;
            color: #1a1a1a;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            border-radius: 4px;
            margin: 5px;
        }
        button:hover {
            background: #9ccc65;
        }
    </style>
</head>
<body>
    <h1>🐛 敌人合图资源测试</h1>
    
    <div class="test-container">
        <h2>加载状态</h2>
        <div id="loadStatus" class="status">等待加载...</div>
        <div id="progressBar" style="width: 100%; height: 20px; background: #333; border-radius: 10px; overflow: hidden; margin: 10px 0;">
            <div id="progressFill" style="width: 0%; height: 100%; background: #8bc34a; transition: width 0.3s;"></div>
        </div>
        <button onclick="startLoading()">开始加载资源</button>
        <button onclick="testSpriteSheet()">测试合图</button>
    </div>

    <div class="test-container">
        <h2>合图预览</h2>
        <div id="sheetStatus" class="status">合图未加载</div>
        <canvas id="sheetPreview" width="512" height="512"></canvas>
    </div>

    <div class="test-container">
        <h2>敌人绘制测试</h2>
        <div id="drawStatus" class="status">未开始绘制测试</div>
        <canvas id="enemyCanvas" width="800" height="400"></canvas>
        <div style="margin-top: 10px;">
            <button onclick="drawAllEnemies()">绘制所有敌人类型</button>
            <button onclick="drawEnemy('normal')">蜘蛛</button>
            <button onclick="drawEnemy('fast')">蝙蝠</button>
            <button onclick="drawEnemy('split')">蚱蜢</button>
            <button onclick="drawEnemy('mini')">蜜蜂</button>
            <button onclick="drawEnemy('ranged')">蝴蝶</button>
        </div>
    </div>

    <script src="js/core/config.js"></script>
    <script src="js/core/resource-loader.js"></script>
    <script src="js/core/game-config.js"></script>
    <script src="js/core/strings.js"></script>
    <script src="js/core/event.js"></script>
    <script src="js/core/utils.js"></script>

    <script>
        function updateStatus(id, message, isError) {
            const el = document.getElementById(id);
            el.textContent = message;
            el.className = isError ? 'status error' : 'status success';
        }

        function updateProgress(loaded, total) {
            const percent = Math.round((loaded / total) * 100);
            document.getElementById('progressFill').style.width = percent + '%';
            updateStatus('loadStatus', `加载中: ${loaded}/${total} (${percent}%)`);
        }

        function startLoading() {
            updateStatus('loadStatus', '开始加载...', false);
            
            ArcSurvivors.ResourceLoader.init(
                function(loaded, total) {
                    updateProgress(loaded, total);
                },
                function() {
                    updateStatus('loadStatus', '加载完成！', false);
                    testSpriteSheet();
                }
            );
        }

        function testSpriteSheet() {
            const RL = ArcSurvivors.ResourceLoader;
            const canvas = document.getElementById('sheetPreview');
            const ctx = canvas.getContext('2d');
            
            if (!RL.hasSpriteSheet('enemies')) {
                updateStatus('sheetStatus', '合图未加载或加载失败', true);
                return;
            }
            
            // 绘制完整的合图
            const sheetInfo = RL.getSpriteFromSheet('normal');
            if (sheetInfo && sheetInfo.image) {
                // 合图可能是2048x2048，需要缩放显示
                ctx.drawImage(sheetInfo.image, 0, 0, 512, 512);
                updateStatus('sheetStatus', '合图加载成功！显示4x4网格预览', false);
                
                // 绘制网格线
                ctx.strokeStyle = 'rgba(139, 195, 74, 0.5)';
                ctx.lineWidth = 1;
                for (let i = 1; i < 4; i++) {
                    const pos = (i / 4) * 512;
                    ctx.beginPath();
                    ctx.moveTo(pos, 0);
                    ctx.lineTo(pos, 512);
                    ctx.stroke();
                    ctx.beginPath();
                    ctx.moveTo(0, pos);
                    ctx.lineTo(512, pos);
                    ctx.stroke();
                }
            }
        }

        function drawEnemy(type) {
            const canvas = document.getElementById('enemyCanvas');
            const ctx = canvas.getContext('2d');
            const RL = ArcSurvivors.ResourceLoader;
            
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            if (!RL.hasSpriteSheet('enemies')) {
                updateStatus('drawStatus', '合图未加载', true);
                return;
            }
            
            const spriteInfo = RL.getSpriteFromSheet(type);
            if (!spriteInfo) {
                updateStatus('drawStatus', '无法获取精灵: ' + type, true);
                return;
            }
            
            // 在画布中央绘制敌人
            const x = canvas.width / 2;
            const y = canvas.height / 2;
            const radius = 50;
            
            ctx.save();
            ctx.translate(x, y);
            
            // 绘制范围圆（调试用）
            ctx.strokeStyle = 'rgba(139, 195, 74, 0.3)';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.arc(0, 0, radius, 0, Math.PI * 2);
            ctx.stroke();
            
            // 绘制精灵
            ctx.drawImage(
                spriteInfo.image,
                spriteInfo.sx, spriteInfo.sy,
                spriteInfo.sw, spriteInfo.sh,
                -radius, -radius,
                radius * 2, radius * 2
            );
            
            ctx.restore();
            
            // 显示信息
            ctx.fillStyle = '#8bc34a';
            ctx.font = '16px Arial';
            ctx.textAlign = 'left';
            const typeNames = {
                'normal': '蜘蛛 (Spider)',
                'fast': '蝙蝠 (Bat)',
                'split': '蚱蜢 (Grasshopper)',
                'mini': '蜜蜂 (Bee)',
                'ranged': '蝴蝶 (Butterfly)'
            };
            ctx.fillText('类型: ' + typeNames[type] || type, 20, 30);
            ctx.fillText('合图位置: 从合图切取', 20, 55);
            
            updateStatus('drawStatus', typeNames[type] + ' 绘制成功', false);
        }

        function drawAllEnemies() {
            const canvas = document.getElementById('enemyCanvas');
            const ctx = canvas.getContext('2d');
            const RL = ArcSurvivors.ResourceLoader;
            
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            if (!RL.hasSpriteSheet('enemies')) {
                updateStatus('drawStatus', '合图未加载', true);
                return;
            }
            
            const types = ['normal', 'fast', 'split', 'mini', 'ranged'];
            const typeNames = {
                'normal': '蜘蛛',
                'fast': '蝙蝠',
                'split': '蚱蜢',
                'mini': '蜜蜂',
                'ranged': '蝴蝶'
            };
            
            const startX = 80;
            const startY = 120;
            const spacing = 140;
            const radius = 50;
            
            ctx.fillStyle = '#8bc34a';
            ctx.font = 'bold 20px Arial';
            ctx.textAlign = 'center';
            ctx.fillText('所有敌人类型预览 (5种)', canvas.width / 2, 40);
            
            for (var i = 0; i < types.length; i++) {
                var type = types[i];
                var spriteInfo = RL.getSpriteFromSheet(type);
                
                if (!spriteInfo) continue;
                
                var x = startX + (i % 5) * spacing;
                var y = startY + Math.floor(i / 5) * 160;
                
                ctx.save();
                ctx.translate(x, y);
                
                // 绘制背景圆
                ctx.fillStyle = 'rgba(139, 195, 74, 0.1)';
                ctx.beginPath();
                ctx.arc(0, 0, radius + 5, 0, Math.PI * 2);
                ctx.fill();
                
                // 绘制精灵
                ctx.drawImage(
                    spriteInfo.image,
                    spriteInfo.sx, spriteInfo.sy,
                    spriteInfo.sw, spriteInfo.sh,
                    -radius, -radius,
                    radius * 2, radius * 2
                );
                
                ctx.restore();
                
                // 绘制名称
                ctx.fillStyle = '#aaa';
                ctx.font = '14px Arial';
                ctx.textAlign = 'center';
                ctx.fillText(typeNames[type], x, y + radius + 25);
            }
            
            updateStatus('drawStatus', '所有敌人类型绘制完成', false);
        }
    </script>
</body>
</html>
